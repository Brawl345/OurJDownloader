<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>__MSG_extensionName__</title>
    <style>
        body {
            width: 450px;
            height: 600px;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 14px;
            background-color: #ffffff;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-sizing: border-box;
        }

        .header {
            display: flex;
            align-items: center;
            padding: 16px 16px 12px 16px;
            border-bottom: 1px solid #e0e0e0;
            flex-shrink: 0;
        }

        .header img {
            width: 24px;
            height: 24px;
            margin-right: 8px;
        }

        .header h1 {
            margin: 0;
            font-size: 16px;
            font-weight: 600;
        }

        .status {
            position: absolute;
            bottom: 70px;
            left: 16px;
            right: 16px;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 13px;
            z-index: 10;
        }

        .status.connected {
            background-color: #e7f5e7;
            color: #2d5a2d;
            border: 1px solid #c3e6c3;
        }

        .status.disconnected {
            background-color: #ffeaea;
            color: #d32f2f;
            border: 1px solid #ffcdd2;
        }

        .status.loading {
            background-color: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }

        .device-list {
            margin-bottom: 16px;
        }

        .main-content {
            flex: 1 1 auto;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 16px;
            min-height: 0;
        }

        .device-list h3 {
            margin: 0 0 8px 0;
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }

        .device-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            margin-bottom: 4px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .device-item:hover {
            background-color: #f5f5f5;
        }

        .device-item.selected {
            background-color: #e3f2fd;
            border-color: #2196f3;
        }

        .device-info {
            flex: 1;
        }

        .device-name {
            font-weight: 500;
            color: #333;
        }

        .device-id {
            font-size: 11px;
            color: #666;
            font-family: 'Monaco', 'Consolas', monospace;
        }

        .device-status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-left: 8px;
        }

        .device-status.online {
            background-color: #4caf50;
        }

        .device-status.offline {
            background-color: #f44336;
        }

        .device-status.unknown {
            background-color: #9e9e9e;
        }

        .actions {
            display: flex;
            gap: 8px;
            padding: 16px;
            background-color: #ffffff;
            border-top: 1px solid #e0e0e0;
            flex-shrink: 0;
        }

        button {
            flex: 1;
            padding: 8px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            background-color: #ffffff;
            color: #333;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            background-color: #f5f5f5;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        button.primary {
            background-color: #2196f3;
            color: white;
            border-color: #2196f3;
        }

        button.primary:hover {
            background-color: #1976d2;
        }

        .empty-state {
            text-align: center;
            padding: 32px 16px;
            color: #666;
        }

        .empty-state h3 {
            margin: 0 0 8px 0;
            font-size: 14px;
            font-weight: 600;
        }

        .empty-state p {
            margin: 0;
            font-size: 13px;
            line-height: 1.4;
        }

        .loading-spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #2196f3;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .basket-section {
            margin-bottom: 16px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            background-color: #fafafa;
        }

        .basket-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            background-color: #f5f5f5;
            border-bottom: 1px solid #e0e0e0;
            border-radius: 4px 4px 0 0;
        }

        .basket-title {
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }

        .basket-count {
            font-size: 11px;
            color: #666;
            background-color: #e0e0e0;
            padding: 3px 8px;
            border-radius: 12px;
        }

        .basket-content {
            padding: 10px 12px;
        }

        .basket-links {
            margin-bottom: 10px;
        }

        .basket-link {
            display: flex;
            align-items: center;
            padding: 6px 0;
            font-size: 12px;
            color: #666;
        }

        .basket-link-url {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-right: 8px;
        }

        .basket-link-remove {
            color: #f44336;
            cursor: pointer;
            font-weight: bold;
            padding: 2px 4px;
            border-radius: 2px;
        }

        .basket-link-remove:hover {
            background-color: #ffebee;
        }

        .basket-actions {
            display: flex;
            gap: 8px;
        }

        .basket-actions button {
            flex: 1;
            padding: 8px 12px;
            font-size: 12px;
        }

        .basket-section.hidden {
            display: none;
        }

        .hidden {
            display: none !important;
        }

        /* CNL Package Styles */
        .basket-manual-links {
            margin-bottom: 12px;
        }

        .basket-package {
            border: 1px solid #d0d0d0;
            border-radius: 6px;
            margin-bottom: 12px;
            background-color: #f8f8f8;
            overflow: hidden;
        }

        .basket-package-header {
            background-color: #eeeeee;
            padding: 8px 12px;
            border-bottom: 1px solid #d0d0d0;
            cursor: pointer;
            user-select: none;
        }

        .basket-package-header:hover {
            background-color: #e8e8e8;
        }

        .basket-package-title {
            font-weight: 600;
            font-size: 13px;
            color: #333;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .basket-package-count {
            background-color: #e0e0e0;
            color: #666;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 8px;
            font-weight: normal;
        }

        .basket-package-password {
            font-size: 11px;
            color: #666;
            font-family: 'Monaco', 'Consolas', monospace;
            margin-top: 2px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .basket-package-links {
            padding: 8px 12px;
            background-color: #ffffff;
            transition: max-height 0.2s ease-out;
            overflow: hidden;
        }

        .basket-package.collapsed .basket-package-links {
            max-height: 0;
            padding-top: 0;
            padding-bottom: 0;
        }

        .basket-package:not(.collapsed) .basket-package-links {
            max-height: none;
        }

        .basket-package.collapsed .basket-package-header {
            border-bottom: none;
        }


        .basket-cnl-link {
            padding: 4px 0;
            border-left: 3px solid #2196f3;
            padding-left: 8px;
            margin-left: 4px;
        }

        .basket-separator {
            font-size: 12px;
            font-weight: 600;
            color: #666;
            margin: 12px 0 8px 0;
            padding-bottom: 4px;
            border-bottom: 1px solid #e0e0e0;
        }
    </style>
</head>
<body>
<div class="header">
    <img alt="Icon" src="../icons/32.png">
    <h1 id="title">__MSG_extensionName__</h1>
</div>

<div class="main-content">
    <div class="device-list" id="device-list" style="display: none;">
        <h3 id="devices-title">__MSG_devicesTitle__</h3>
        <div id="devices-container"></div>
    </div>

    <div class="basket-section hidden" id="basket-section">
        <div class="basket-header">
            <span class="basket-title">__MSG_linkBasketTitle__</span>
            <span class="basket-count" id="basket-count">0</span>
        </div>
        <div class="basket-content">
            <div class="basket-links hidden" id="basket-links"></div>
            <div class="basket-actions hidden" id="basket-actions">
                <button id="clear-basket-btn">__MSG_clearBasket__</button>
            </div>
        </div>
    </div>

    <div class="empty-state" id="empty-state" style="display: none;">
        <h3 id="empty-title">__MSG_noDevicesTitle__</h3>
        <p id="empty-message">__MSG_noDevicesMessage__</p>
    </div>
</div>

<div class="status loading" id="status">
    <span class="loading-spinner"></span>
    <span id="status-text">__MSG_statusLoading__</span>
</div>

<div class="actions">
    <button disabled id="refresh-btn">
        __MSG_refreshButton__
    </button>
    <button id="settings-btn">
        __MSG_settingsButton__
    </button>
</div>

<script src="../build/popup/popup.js" type="module"></script>
</body>
</html>
