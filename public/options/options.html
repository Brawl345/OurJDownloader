<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>__MSG_optionsTitle__</title>
    <style>
        body {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 14px;
            line-height: 1.5;
            background-color: #f5f5f5;
        }

        .container {
            background: white;
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        h1 {
            margin: 0 0 24px 0;
            font-size: 24px;
            font-weight: 600;
            color: #333;
        }

        .section {
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid #e0e0e0;
        }

        .section:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .section-title {
            margin: 0 0 16px 0;
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 4px;
            font-weight: 500;
            color: #555;
        }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }

        input[type="email"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #2196f3;
            box-shadow: 0 0 0 2px rgba(33, 150, 243, 0.2);
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        button {
            padding: 10px 20px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: white;
            color: #333;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            background: #f5f5f5;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        button.primary {
            background: #2196f3;
            color: white;
            border-color: #2196f3;
        }

        button.primary:hover {
            background: #1976d2;
            border-color: #1976d2;
        }

        button.danger {
            background: #f44336;
            color: white;
            border-color: #f44336;
        }

        button.danger:hover {
            background: #d32f2f;
            border-color: #d32f2f;
        }

        .message {
            padding: 12px 16px;
            border-radius: 4px;
            margin-top: 16px;
            font-size: 13px;
            display: none;
        }

        .message.success {
            background: #e7f5e7;
            color: #2d5a2d;
            border: 1px solid #c3e6c3;
        }

        .message.error {
            background: #ffeaea;
            color: #d32f2f;
            border: 1px solid #ffcdd2;
        }

        .loading-spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid transparent;
            border-top: 2px solid currentColor;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .form-row {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 16px;
        }

        .form-row input[type="checkbox"] {
            margin-top: 2px;
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        .form-row .label-content {
            flex: 1;
        }

        .form-row .label-content label {
            margin: 0 0 4px 0;
            font-weight: 500;
            color: #333;
            cursor: pointer;
        }

        .setting-description {
            font-size: 12px;
            color: #666;
            margin: 0;
        }
    </style>
</head>
<body>
<div class="container">
    <h1 id="title">__MSG_optionsTitle__</h1>

    <div class="section">
        <h2 class="section-title" id="credentials-section">__MSG_credentialsSection__</h2>

        <div class="form-group">
            <label for="email" id="email-label">__MSG_emailLabel__</label>
            <input id="email" placeholder="your.email@example.com" required type="email">
        </div>

        <div class="form-group">
            <label for="password" id="password-label">__MSG_passwordLabel__</label>
            <input id="password" placeholder="Your MyJDownloader password" required type="password">
        </div>

        <div class="button-group">
            <button class="primary" id="save-btn">
                __MSG_saveButton__
            </button>
            <button class="danger" id="clear-btn">
                __MSG_clearButton__
            </button>
        </div>

        <div class="message" id="message"></div>
    </div>

    <div class="section">
        <h2 class="section-title" id="general-section">__MSG_generalSection__</h2>

        <div class="form-row">
            <input type="checkbox" id="basket-notifications-enabled">
            <div class="label-content">
                <label for="basket-notifications-enabled" id="basket-notifications-label">__MSG_basketNotificationsLabel__</label>
                <div class="setting-description">__MSG_basketNotificationsDescription__</div>
            </div>
        </div>

        <div class="form-row">
            <input type="checkbox" id="cnl-enabled">
            <div class="label-content">
                <label for="cnl-enabled" id="cnl-enabled-label">__MSG_cnlEnabledLabel__</label>
                <div class="setting-description">__MSG_cnlEnabledDescription__</div>
            </div>
        </div>
    </div>
</div>

<script src="../build/options/options.js" type="module"></script>
</body>
</html>
